name: Publish PyPI package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version
        run: |
          VERSION=$(grep '^version' sdk/python/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install build dependencies
        run: pip install build

      - name: Build
        run: python -m build
        working-directory: sdk/python

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio ".[dev]"
        working-directory: sdk/python

      - name: Test
        run: pytest
        working-directory: sdk/python

      - name: Check if version is already published
        id: check-published
        # Query the PyPI JSON API for an exact-version match. The previous
        # implementation grepped `pip index versions` output, which is a
        # substring match — "0.0.5" would match "0.0.50" or "0.0.5.dev1"
        # and falsely report the release as already published, silently
        # skipping the publish step.
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/astropods-messaging/${VERSION}/json")
          case "$STATUS" in
            200)
              echo "published=true" >> $GITHUB_OUTPUT
              echo "::notice::astropods-messaging==${VERSION} is already published on PyPI"
              ;;
            404)
              echo "published=false" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "::error::PyPI returned unexpected status ${STATUS} when checking ${VERSION}"
              exit 1
              ;;
          esac
        env:
          VERSION: ${{ env.VERSION }}

      - name: Publish
        if: steps.check-published.outputs.published == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

