name: Build Latest

# Manual promotion of an existing astropods/messaging:<sha> multi-arch
# manifest (built by the Build Next workflow on every push to main)
# to the stable :latest tag plus an optional version tag.
#
# No rebuild happens here — docker buildx imagetools create is a pure
# manifest retag, so :latest is byte-identical to the :next or :<sha>
# image that was already in production.

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Source commit SHA to promote (defaults to HEAD of main)"
        required: false
      version:
        description: "Optional version tag to also apply (e.g. v0.0.5). Leave empty to only update :latest."
        required: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  IMAGE: astropods/messaging

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Resolve source SHA and version
        id: resolve
        run: |
          SHA="${{ inputs.sha }}"
          if [ -z "$SHA" ]; then
            SHA="${{ github.sha }}"
          fi
          VERSION="${{ inputs.version }}"
          echo "sha=$SHA"        >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ -n "$VERSION" ]; then
            echo "Promoting $IMAGE:$SHA → $IMAGE:latest and $IMAGE:$VERSION"
          else
            echo "Promoting $IMAGE:$SHA → $IMAGE:latest"
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify source image exists
        run: |
          docker buildx imagetools inspect "$IMAGE:${{ steps.resolve.outputs.sha }}" >/dev/null \
            || (echo "::error::Source image $IMAGE:${{ steps.resolve.outputs.sha }} not found on Docker Hub. Run the Build Next workflow against this commit first." && exit 1)

      - name: Promote to :latest
        run: |
          TAGS=( -t "$IMAGE:latest" )
          if [ -n "${{ steps.resolve.outputs.version }}" ]; then
            TAGS+=( -t "$IMAGE:${{ steps.resolve.outputs.version }}" )
          fi
          docker buildx imagetools create \
            "${TAGS[@]}" \
            "$IMAGE:${{ steps.resolve.outputs.sha }}"
          echo "::notice::Promoted $IMAGE:${{ steps.resolve.outputs.sha }} → $IMAGE:latest${{ steps.resolve.outputs.version && format(' and $IMAGE:{0}', steps.resolve.outputs.version) || '' }}"
