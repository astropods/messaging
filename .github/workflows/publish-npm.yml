name: Publish npm package

# Version is read straight from sdk/node/package.json. To cut a release, bump
# the version in package.json on main, then trigger this workflow (or publish
# a GitHub release). The workflow never mutates package.json or pushes back
# to the repo — npm SDK versioning is decoupled from the root VERSION file.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Read version
        run: |
          VERSION=$(node -p "require('./sdk/node/package.json').version")
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            echo "::error::Could not read version from sdk/node/package.json"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "::notice::Publishing @astropods/messaging@$VERSION"

      - name: Install dependencies
        run: bun install
        working-directory: sdk/node

      - name: Build
        run: bun run build
        working-directory: sdk/node

      - name: Test
        run: bun test
        working-directory: sdk/node

      - name: Check if version is already published
        id: check-published
        run: |
          if npm view "@astropods/messaging@${{ env.VERSION }}" version 2>/dev/null; then
            echo "published=true" >> $GITHUB_OUTPUT
            echo "::notice::v${{ env.VERSION }} is already published on npm — nothing to do"
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.check-published.outputs.published == 'false'
        run: npm publish --access public
        working-directory: sdk/node
