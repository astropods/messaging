syntax = "proto3";

package astro.messaging.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/postman/astro/messaging/v1;messagingv1";

// Message from user to agent (platform → agent)
message Message {
  // Identity (who, when, where)
  string id = 1;                          // UUID generated by messaging service
  google.protobuf.Timestamp timestamp = 2;

  // Platform identification
  string platform = 3;                    // "slack" | "discord" | "teams"
  PlatformContext platform_context = 4;   // Platform-specific IDs and metadata

  // User who sent the message
  User user = 5;

  // Message content
  string content = 6;                     // Cleaned text (mentions resolved, etc.)
  repeated Attachment attachments = 7;

  // Conversation routing
  // Messaging service provides this for correlation only
  // Agent is responsible for loading/storing actual conversation history
  string conversation_id = 8;             // Stable ID across message lifecycle
}

// Platform-specific context (adapter populates this)
message PlatformContext {
  // Required: Core platform IDs
  string message_id = 1;                  // Original platform message ID
  string channel_id = 2;                  // Channel/room/chat ID
  string thread_id = 3;                   // Thread/reply chain ID (optional)

  // Optional: Display names
  string channel_name = 4;
  string workspace_id = 5;                // Slack workspace, Discord guild, etc.

  // Platform-specific data
  // Examples: Slack ts, Discord snowflake, Teams activity ID
  map<string, string> platform_data = 10;

  // The adapter's own bot/app user ID in the source platform (Slack U…, etc.).
  // Adapters strip the bot's @-mention from content before forwarding; this
  // field lets the agent still detect "I was mentioned" in any path.
  string bot_user_id = 12;

  // EventKind is the fine-grained source event that produced this message.
  // Trigger answers "did the user address the bot?" (coarse: DIRECT/OBSERVED);
  // EventKind answers "how?" so the agent can branch on app-mention vs
  // thread-reply vs reaction vs button without inspecting content. Platform-
  // specific values (REACTION, BUTTON_CLICK, SLASH_COMMAND, ASSISTANT_THREAD_STARTED)
  // are no-ops on platforms that don't have the concept.
  enum EventKind {
    EVENT_KIND_UNSPECIFIED              = 0;
    EVENT_KIND_DM                       = 1; // 1:1 / private chat (DM, web chat session)
    EVENT_KIND_APP_MENTION              = 2; // bot was @-mentioned (channel or thread)
    EVENT_KIND_THREAD_REPLY             = 3; // reply in a channel thread, no @-mention
    EVENT_KIND_OBSERVED                 = 4; // observe-channel forward
    EVENT_KIND_REACTION                 = 5;
    EVENT_KIND_BUTTON_CLICK             = 6;
    EVENT_KIND_SLASH_COMMAND            = 7;
    EVENT_KIND_ASSISTANT_THREAD_STARTED = 8;
  }
  EventKind event_kind = 13;

  // ThreadRootId is the parent thread's root timestamp when this message is
  // a reply in an existing thread; empty for top-level messages. Use this to
  // tell "in a thread or not" — distinct from `thread_id` which is the agent's
  // reply target (also populated for top-level invocations where the agent's
  // response should open a new thread under the user's message).
  string thread_root_id = 14;
}

// User information
message User {
  string id = 1;                          // Platform-specific user ID
  string username = 2;                    // Display name or handle
  string avatar_url = 3;                  // Avatar URL (optional)
  string email = 4;                       // Email if available (optional)

  // Platform-specific user data
  map<string, string> user_data = 5;
}

// Attachment from user message
message Attachment {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    IMAGE = 1;                            // jpg, png, gif, webp
    FILE = 2;                             // Generic file
    VIDEO = 3;                            // mp4, mov, etc.
    AUDIO = 4;                            // mp3, wav, etc.
    LINK = 5;                             // URL preview/embed
  }

  Type type = 1;
  string url = 2;                         // Direct download URL (authenticated)
  string filename = 3;
  int64 size_bytes = 4;                   // Optional
  string mime_type = 5;                   // Optional

  // Optional metadata for rich attachments
  string title = 6;
  string description = 7;
  int32 width = 8;                        // For images/videos
  int32 height = 9;
}
