tasks:
  "proto-gen":
    command: "bash scripts/generate-proto.sh"
    inputs:
      - "proto/**/*"
    outputs:
      - "pkg/gen"
  "sdk-build":
    command: "cd sdk/node && bun install && bun run build"
    inputs:
      - "sdk/node/**/*"
      - "proto/**/*"
    outputs:
      - "sdk/node/dist"
  "publish-local":
    command: "bash scripts/publish-local.sh"
    deps:
      - "sdk-build"
